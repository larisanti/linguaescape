services:
  # Frontend: Streamlit
  frontend:
    build: .
    container_name: linguaescape_streamlit
    command: streamlit run app.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - .:/app
    restart: unless-stopped
    depends_on:
      - api # Garante que o frontend só suba depois da API

  # Backend: FastAPI
  api:
    build: .
    container_name: linguaescape_fastapi
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
    restart: unless-stopped